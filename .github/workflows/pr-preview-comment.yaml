name: Comment Cloudflare Preview URL

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  checks: read

jobs:
  comment-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Cloudflare check
        run: sleep 45

      - name: Get Cloudflare preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request.head.sha;

            const checks = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: sha
            });

            const cfCheck = checks.data.check_runs.find(check =>
              check.name.includes("Cloudflare")
            );

            if (!cfCheck) {
              console.log("Cloudflare check not found.");
              return;
            }

            const previewUrl = cfCheck.details_url;

            const body = `🚀 **Preview Deployment**${previewUrl}`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body
            });